name: Sync to Hugging Face

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN}}   # <-- this pulls your Hugging Face token from GitHub Secrets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Upload to Hugging Face Space
        run: git push --force https://Singh-Urvashi:$HF_TOKEN@huggingface.co/spaces/Singh-Urvashi/TomLeafVision main
